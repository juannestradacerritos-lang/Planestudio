<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario</title>
    <meta name="theme-color" content="#2563eb">
    
    <!-- jsPDF para Exportar a PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Iconos de FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        // TRUCO PWA EN UN SOLO ARCHIVO
        const manifestData = {
            name: "Plan de estudio",
            short_name: "Cuestionario",
            start_url: window.location.href,
            display: "standalone",
            background_color: "#f1f5f9",
            theme_color: "#2563eb",
            icons: [{
                src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📕</text></svg>",
                sizes: "512x512",
                type: "image/svg+xml",
                purpose: "any maskable"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/manifest+json'});
        const manifestUrl = URL.createObjectURL(manifestBlob);
        document.write(`<link rel="manifest" href="${manifestUrl}">`);
    </script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --purple-hover: #7c3aed;
            --background: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        h2 { text-align: center; margin-top: 5px; margin-bottom: 20px; color: var(--primary); font-size: 26px; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; display: block; }
        
        textarea, select, input[type="text"] {
            width: 100%; padding: 12px; box-sizing: border-box;
            border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 15px; transition: border-color 0.2s;
            background-color: #f8fafc; font-family: inherit;
        }
        textarea { resize: vertical; min-height: 60px; }
        textarea:focus, select:focus, input[type="text"]:focus { outline: none; border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button, .btn-label {
            width: 100%; padding: 14px; margin-top: 5px;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active, .btn-label:active { transform: scale(0.98); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); color: white; margin-top: 10px;}
        .btn-pdf { background-color: var(--danger); color: white; margin-top: 10px; }
        .btn-override { background-color: var(--purple); color: white; margin-top: 10px; }
        .btn-override:hover { background-color: var(--purple-hover); }
        .btn-outline { background-color: transparent; border: 2px solid #cbd5e1; color: var(--text-muted); margin-top: 10px;}
        
        .btn-backup { background-color: #475569; color: white; margin-top: 10px; }
        .btn-backup:hover { background-color: #334155; }
        
        .hidden { display: none !important; }
        
        .btn-micro {
            width: auto; padding: 6px 10px; margin: 0;
            background-color: #64748b; color: white;
            border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-micro:hover { background-color: #475569; }
        .btn-micro:active { transform: scale(0.95); }
        
        .search-box {
            position: relative; margin-bottom: 10px;
        }
        .search-box i {
            position: absolute; left: 12px; top: 14px; color: #94a3b8;
        }
        .search-box input {
            padding-left: 35px; background-color: #fff; border-color: #cbd5e1;
        }

        .questions-list-container {
            height: 280px; min-height: 150px; resize: vertical; overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px; padding: 10px; background: #f8fafc;
        }
        .question-item {
            background: white; padding: 12px; margin-bottom: 8px;
            border-radius: 6px; border: 1px solid #e2e8f0;
            display: flex; flex-direction: column; gap: 10px;
            transition: all 0.2s;
        }
        .question-item.editing { border-color: var(--warning); background-color: #fffbeb; }
        .question-item-text { font-size: 13px; color: #334155; }
        .question-item-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; padding-top: 8px; }
        .action-btns { display: flex; gap: 5px; }
        .btn-icon { width: 32px; height: 32px; padding: 0; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin: 0; color: white; font-size: 12px;}
        .btn-edit { background-color: var(--warning); }
        .btn-delete { background-color: var(--danger); }
        .btn-move { background-color: var(--info); }
        .btn-icon:disabled { opacity: 0.3; background-color: #cbd5e1; }
        
        .no-answer { color: var(--danger); font-style: italic; font-weight: 500; }

        .stats-bar {
            display: flex; justify-content: space-between; background: #f8fafc; padding: 12px;
            border-radius: 8px; margin-bottom: 20px; font-weight: 600; font-size: 14px; border: 1px solid #e2e8f0;
        }
        .question-box { 
            background: #f8fafc; padding: 25px 20px; border-radius: 12px; 
            text-align: center; margin-bottom: 20px; font-size: 18px; font-weight: 600; border: 1px solid #e2e8f0;
        }
        
        .feedback { text-align: center; font-weight: bold; margin: 15px 0; font-size: 16px; min-height: 24px; line-height: 1.4; }
        .correct { color: var(--success); }
        .incorrect { color: var(--danger); }
        
        .install-banner { 
            background: #0f172a; color: white; padding: 12px; 
            border-radius: 8px; text-align: center; margin-bottom: 20px; 
            cursor: pointer; display: none; font-weight: 600; font-size: 14px;
        }
        
        .checkbox-container {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 15px; font-size: 14px; font-weight: 600; color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- MODO CREADOR -->
    <div class="container" id="setup-section">
        <div class="install-banner" id="install-banner">
            <i class="fas fa-download"></i> Instalar como Aplicación
        </div>

        <div style="display: flex; justify-content: flex-start; gap: 8px; margin-bottom: 5px;">
            <button class="btn-micro" onclick="downloadBackup()" title="Descargar copia">
                <i class="fas fa-download"></i> Guardar Respaldo
            </button>
            <label class="btn-micro" title="Cargar copia guardada">
                <i class="fas fa-upload"></i> Cargar Respaldo
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importBackup(event)">
            </label>
        </div>
        
        <h2>📕 Plan de estudio</h2>

        <div class="input-group">
            <label>Tema / Cuestionario actual</label>
            <div style="display: flex; gap: 8px;">
                <select id="quiz-selector" onchange="changeQuiz()"></select>
                <button class="btn-outline" style="width: auto; padding: 0 15px; margin: 0; margin-top:0;" onclick="createNewQuiz()" title="Crear nuevo cuestionario">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>
        
        <div class="input-group">
            <label>Pregunta (Obligatoria)</label>
            <textarea id="question-input" rows="2" placeholder="Escribe aquí tu pregunta..."></textarea>
        </div>
        <div class="input-group">
            <label>Respuesta Correcta (Opcional por ahora)</label>
            <textarea id="answer-input" rows="2" placeholder="Puedes dejarla en blanco y llenarla después..."></textarea>
        </div>
        
        <button id="save-btn" class="btn-primary" onclick="addQuestion()" style="margin-bottom: 5px;">
            <i class="fas fa-save"></i> Guardar Pregunta
        </button>
        <button id="cancel-edit-btn" class="btn-outline hidden" onclick="cancelEdit()" style="margin-bottom: 15px; margin-top:5px;">
            <i class="fas fa-times"></i> Cancelar Edición
        </button>
        
        <div style="margin-top: 25px; margin-bottom: 10px; display:flex; justify-content: space-between; align-items:center;">
            <label style="margin:0;">Lista de Preguntas (<span id="count" style="color: var(--primary);">0</span>)</label>
        </div>

        <!-- BUSCADOR -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Buscar pregunta o respuesta..." oninput="updateListUI()">
        </div>

        <div class="questions-list-container" id="list-container">
            <div id="questions-list"></div>
        </div>
        
        <div style="margin-top: 20px;">
            <div class="checkbox-container">
                <input type="checkbox" id="shuffle-checkbox"> 
                <label for="shuffle-checkbox" style="margin:0; display:inline;">Mezclar orden al jugar (Aleatorio)</label>
            </div>

            <button class="btn-success" style="margin-top: 15px;" onclick="startStudy()">
                <i class="fas fa-play"></i> Iniciar Examen Directo
            </button>
            <button class="btn-pdf" onclick="exportPDF()">
                <i class="fas fa-file-pdf"></i> Guardar en PDF
            </button>
        </div>
    </div>

    <!-- MODO ESTUDIO -->
    <div class="container hidden" id="study-section">
        <div class="stats-bar">
            <span id="question-counter"><i class="fas fa-list-ol"></i> 1/1</span>
            <span id="score-counter"><i class="fas fa-star" style="color:#fbbf24;"></i> 0</span>
        </div>
        
        <div class="question-box" id="display-question">La pregunta aparecerá aquí</div>
        
        <textarea id="user-answer" rows="3" placeholder="Escribe tu respuesta aquí..."></textarea>
        
        <p id="feedback" class="feedback"></p>
        
        <!-- NUEVO: Botón para forzar respuesta correcta -->
        <button class="btn-override hidden" id="override-btn" onclick="overrideCorrect()">
            <i class="fas fa-balance-scale"></i> Mi respuesta es correcta (Forzar acierto)
        </button>

        <button class="btn-primary" id="check-btn" onclick="checkAnswer()">Comprobar Respuesta</button>
        <button class="btn-success hidden" id="next-btn" onclick="nextQuestion()">Siguiente <i class="fas fa-arrow-right"></i></button>
        <button class="btn-outline" style="margin-top: 15px;" onclick="location.reload()">Abandonar estudio</button>
    </div>

    <!-- RESULTADOS -->
    <div class="container hidden" id="results-section">
        <h2>📕 Plan de estudio</h2>
        <div class="question-box" style="font-size: 24px; color: var(--primary);">
            <span id="final-score">0/0</span>
        </div>
        <p id="final-message" style="text-align: center; font-weight: 600; margin-bottom: 25px;"></p>
        
        <button class="btn-primary" onclick="restartStudy()"><i class="fas fa-redo"></i> Repetir cuestionario</button>
        <button class="btn-outline" onclick="location.reload()" style="margin-top: 10px;"><i class="fas fa-home"></i> Volver al menú</button>
    </div>

    <script>
        // ==========================================
        // SERVICE WORKER (Para PWA)
        // ==========================================
        const swCode = `
            self.addEventListener('install', (e) => self.skipWaiting());
            self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
            self.addEventListener('fetch', (e) => {
                e.respondWith(fetch(e.request).catch(() => new Response('Modo Offline')));
            });
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });
        document.getElementById('install-banner').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                document.getElementById('install-banner').style.display = 'none';
                deferredPrompt = null;
            }
        });

        // ==========================================
        // GESTIÓN DE DATOS Y LISTAS
        // ==========================================
        let allData = JSON.parse(localStorage.getItem('misCuestionarios')) || { "Cuestionario Base": [] };
        let currentQuizName = Object.keys(allData)[0];
        let flashcards = allData[currentQuizName];
        let studyCards = [];
        let currentIndex = 0;
        let score = 0;
        let editingIndex = -1; 

        window.onload = () => {
            updateSelectorUI();
            updateListUI();
        };

        function saveData() {
            allData[currentQuizName] = flashcards;
            localStorage.setItem('misCuestionarios', JSON.stringify(allData));
        }

        function updateSelectorUI() {
            const selector = document.getElementById('quiz-selector');
            selector.innerHTML = '';
            for (let name in allData) {
                let option = document.createElement('option');
                option.value = name;
                option.innerText = name;
                if (name === currentQuizName) option.selected = true;
                selector.appendChild(option);
            }
        }

        function createNewQuiz() {
            let name = prompt("Escribe un nombre para el nuevo cuestionario:");
            if (name && name.trim() !== "") {
                if (!allData[name]) {
                    allData[name] = [];
                    currentQuizName = name;
                    flashcards = allData[currentQuizName];
                    saveData();
                    updateSelectorUI();
                    updateListUI();
                } else {
                    alert("Ese nombre ya existe.");
                }
            }
        }

        function changeQuiz() {
            currentQuizName = document.getElementById('quiz-selector').value;
            flashcards = allData[currentQuizName];
            cancelEdit(); 
            updateListUI();
        }

        function addQuestion() {
            const q = document.getElementById('question-input').value.trim();
            const a = document.getElementById('answer-input').value.trim();
            
            if (!q) {
                alert("Debes escribir al menos la pregunta.");
                return;
            }

            const isDuplicate = flashcards.some((fc, idx) => {
                return idx !== editingIndex && fc.question.trim().toLowerCase() === q.toLowerCase();
            });

            if (isDuplicate) {
                const conf = confirm("¡Aviso! Ya existe una pregunta idéntica en este cuestionario. ¿Deseas guardarla de todos modos?");
                if (!conf) return; 
            }

            if (editingIndex > -1) {
                flashcards[editingIndex] = { question: q, answer: a };
                cancelEdit(); 
            } else {
                flashcards.push({ question: q, answer: a });
                document.getElementById('question-input').value = '';
                document.getElementById('answer-input').value = '';
                document.getElementById('question-input').focus();
            }

            saveData();
            updateListUI();
        }

        function editQuestion(index) {
            editingIndex = index;
            document.getElementById('question-input').value = flashcards[index].question;
            document.getElementById('answer-input').value = flashcards[index].answer;
            
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Actualizar Pregunta';
            saveBtn.style.backgroundColor = 'var(--warning)';
            
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            
            updateListUI();
            document.getElementById('question-input').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function cancelEdit() {
            editingIndex = -1;
            document.getElementById('question-input').value = '';
            document.getElementById('answer-input').value = '';
            
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerHTML = '<i class="fas fa-save"></i> Guardar Pregunta';
            saveBtn.style.backgroundColor = 'var(--primary)';
            
            document.getElementById('cancel-edit-btn').classList.add('hidden');
            updateListUI();
        }

        function deleteQuestion(index) {
            if (confirm("¿Estás seguro de borrar esta pregunta?")) {
                if (editingIndex === index) cancelEdit();
                flashcards.splice(index, 1);
                saveData();
                updateListUI();
            }
        }

        function moveUp(index) {
            if (index > 0) {
                let temp = flashcards[index];
                flashcards[index] = flashcards[index - 1];
                flashcards[index - 1] = temp;
                
                if (editingIndex === index) editingIndex = index - 1;
                else if (editingIndex === index - 1) editingIndex = index;

                saveData();
                updateListUI();
            }
        }

        function moveDown(index) {
            if (index < flashcards.length - 1) {
                let temp = flashcards[index];
                flashcards[index] = flashcards[index + 1];
                flashcards[index + 1] = temp;
                
                if (editingIndex === index) editingIndex = index + 1;
                else if (editingIndex === index + 1) editingIndex = index;

                saveData();
                updateListUI();
            }
        }

        function updateListUI() {
            const listEl = document.getElementById('questions-list');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            document.getElementById('count').innerText = flashcards.length;
            listEl.innerHTML = '';

            if (flashcards.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; color:#94a3b8; font-size:13px; margin-top:20px;">No hay preguntas aquí.</div>';
                return;
            }

            let displayCards = flashcards.map((item, originalIndex) => ({ item, originalIndex }));

            if (searchTerm) {
                displayCards = displayCards.filter(obj => 
                    obj.item.question.toLowerCase().includes(searchTerm) || 
                    obj.item.answer.toLowerCase().includes(searchTerm)
                );
            }

            if (displayCards.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; color:#94a3b8; font-size:13px; margin-top:20px;">No se encontraron coincidencias para tu búsqueda.</div>';
                return;
            }

            displayCards.forEach((obj) => {
                const item = obj.item;
                const index = obj.originalIndex;
                let answerDisplay = item.answer !== "" ? item.answer : '<span class="no-answer">(Sin respuesta aún)</span>';
                
                const isEditingClass = (index === editingIndex) ? 'editing' : '';
                const disableMove = searchTerm ? 'disabled' : '';

                listEl.innerHTML += `
                    <div class="question-item ${isEditingClass}">
                        <div class="question-item-text">
                            <strong>${index + 1}. P:</strong> ${item.question}<br>
                            <strong>R:</strong> ${answerDisplay}
                        </div>
                        <div class="question-item-actions">
                            <div class="action-btns">
                                <button onclick="moveUp(${index})" class="btn-icon btn-move" title="Mover arriba" ${disableMove}><i class="fas fa-arrow-up"></i></button>
                                <button onclick="moveDown(${index})" class="btn-icon btn-move" title="Mover abajo" ${disableMove}><i class="fas fa-arrow-down"></i></button>
                            </div>
                            <div class="action-btns">
                                <button onclick="editQuestion(${index})" class="btn-icon btn-edit" title="Modificar"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteQuestion(${index})" class="btn-icon btn-delete" title="Borrar"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // ==========================================
        // RESPALDOS Y EXPORTACIONES
        // ==========================================
        function downloadBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            const dateStr = new Date().toISOString().split('T')[0];
            downloadAnchorNode.setAttribute("download", `Respaldo_Cuestionarios_${dateStr}.json`);
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (importedData && typeof importedData === 'object') {
                        if(confirm("¿Estás seguro de cargar este respaldo? Reemplazará los cuestionarios actuales que tengas sin guardar.")) {
                            allData = importedData;
                            localStorage.setItem('misCuestionarios', JSON.stringify(allData));
                            currentQuizName = Object.keys(allData)[0] || "Cuestionario Base";
                            flashcards = allData[currentQuizName] || [];
                            cancelEdit();
                            updateSelectorUI();
                            updateListUI();
                            alert("¡Respaldo cargado correctamente!");
                        }
                    }
                } catch (err) {
                    alert("El archivo seleccionado no es un respaldo válido.");
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        function exportPDF() {
            if (flashcards.length === 0) {
                alert("Agrega al menos una pregunta antes de exportar.");
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('portrait', 'mm', 'a4'); 
            
            const pageWidth = doc.internal.pageSize.width;
            const pageHeight = doc.internal.pageSize.height;

            doc.setFillColor(15, 23, 42); 
            doc.rect(0, 0, pageWidth, 18, 'F'); 
            
            doc.setTextColor(255, 255, 255); 
            doc.setFontSize(14); 
            doc.setFont("helvetica", "bold");
            doc.text("Guía de Preparación", 15, 11);

            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            const date = new Date().toLocaleDateString();
            doc.text(`Fecha: ${date}`, pageWidth - 15, 11, { align: 'right' });

            doc.setTextColor(51, 65, 85); 
            doc.setFontSize(12);
            doc.setFont("helvetica", "bold");
            doc.text(`Tema: ${currentQuizName}`, 15, 26);
            
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text(`Total de preguntas: ${flashcards.length}`, 15, 31);
            
            doc.setDrawColor(226, 232, 240);
            doc.setLineWidth(0.5);
            doc.line(15, 34, pageWidth - 15, 34);

            const tableData = flashcards.map((fc, i) => [
                i + 1, 
                fc.question, 
                fc.answer !== "" ? fc.answer : "______________________________________"
            ]);
            
            doc.autoTable({
                startY: 38,
                head: [['Nº', 'Pregunta', 'Respuesta Correcta']],
                body: tableData,
                theme: 'grid',
                rowPageBreak: 'avoid', 
                headStyles: { 
                    fillColor: [220, 38, 38],
                    textColor: 255, 
                    fontStyle: 'bold',
                    halign: 'center',
                    valign: 'middle'
                },
                bodyStyles: {
                    textColor: [30, 41, 59],
                    fontSize: 10,
                    valign: 'middle',
                    lineColor: [226, 232, 240]
                },
                alternateRowStyles: {
                    fillColor: [248, 250, 252]
                },
                columnStyles: { 
                    0: { cellWidth: 12, halign: 'center', fontStyle: 'bold' }, 
                    1: { cellWidth: 85, fontStyle: 'bold' },
                    2: { cellWidth: 83 } 
                },
                margin: { left: 15, right: 15, bottom: 20 },
                
                didDrawPage: function (data) {
                    doc.setFontSize(9);
                    doc.setTextColor(148, 163, 184); 
                    doc.text(
                        `Página ${doc.internal.getNumberOfPages()}`, 
                        pageWidth - 15, 
                        pageHeight - 10, 
                        { align: 'right' }
                    );
                }
            });
            
            let filename = currentQuizName.replace(/\s+/g, '_') + '_Ascenso.pdf';
            doc.save(filename);
        }

        // ==========================================
        // LÓGICA DE ESTUDIO
        // ==========================================
        function shuffleArray(array) {
            let newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function startStudy() {
            if (flashcards.length === 0) {
                alert("Agrega preguntas a este cuestionario primero.");
                return;
            }
            
            const pendientes = flashcards.filter(f => f.answer === "");
            if (pendientes.length > 0) {
                alert("¡Espera! Tienes preguntas marcadas '(Sin respuesta aún)'. Complétalas antes de jugar.");
                return;
            }

            const wantsShuffle = document.getElementById('shuffle-checkbox').checked;
            if (wantsShuffle) {
                studyCards = shuffleArray(flashcards);
            } else {
                studyCards = [...flashcards]; 
            }
            
            currentIndex = 0;
            score = 0;
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('results-section').classList.add('hidden');
            document.getElementById('study-section').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('feedback').innerText = '';
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('override-btn').classList.add('hidden');
            
            document.getElementById('question-counter').innerHTML = `<i class="fas fa-list-ol"></i> ${currentIndex + 1}/${studyCards.length}`;
            document.getElementById('score-counter').innerHTML = `<i class="fas fa-star" style="color:#fbbf24;"></i> ${score}`;
            document.getElementById('display-question').innerText = studyCards[currentIndex].question;
            
            const txtInput = document.getElementById('user-answer');
            document.getElementById('check-btn').classList.remove('hidden');
            
            txtInput.value = '';
            txtInput.disabled = false;
            txtInput.focus();
        }

        function checkAnswer() {
            const userAnswer = document.getElementById('user-answer').value.trim();
            const correctAnswer = studyCards[currentIndex].answer.trim();
            const feedback = document.getElementById('feedback');

            if (userAnswer === "") {
                alert("Por favor escribe una respuesta.");
                return;
            }

            const normalize = (str) => {
                return str.toLowerCase()
                          .normalize("NFD").replace(/[\u0300-\u036f]/g, "") 
                          .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()¿?¡!]/g, " ") 
                          .replace(/\s+/g, " ") 
                          .trim();
            };

            const normUser = normalize(userAnswer);
            const normCorrect = normalize(correctAnswer);

            let isCorrect = false;
            let isFuzzy = false;

            if (normUser === normCorrect) {
                isCorrect = true;
            } else {
                const stopWords = ['el', 'la', 'los', 'las', 'un', 'una', 'unos', 'unas', 'y', 'o', 'de', 'del', 'al', 'con', 'por', 'para', 'en', 'a', 'es', 'son', 'se', 'lo', 'que', 'como', 'su', 'sus'];
                
                const cWords = normCorrect.split(' ').filter(w => !stopWords.includes(w) && w.length > 2);
                
                if (cWords.length > 0) {
                    let matches = 0;
                    cWords.forEach(cw => {
                        if (normUser.includes(cw)) matches++;
                    });
                    
                    if ((matches / cWords.length) >= 0.7) {
                        isCorrect = true;
                        isFuzzy = true;
                    }
                } else {
                    if (normUser.includes(normCorrect)) {
                        isCorrect = true;
                        isFuzzy = true;
                    }
                }
            }

            if (isCorrect) {
                score++;
                if (isFuzzy) {
                    feedback.innerHTML = `<i class="fas fa-check-double"></i> ¡Bien! Lo detecté como correcto.<br><span style="font-size:14px; font-weight:normal; color:#16a34a; display:block; margin-top:5px;">La respuesta exacta era: <b>${correctAnswer}</b></span>`;
                } else {
                    feedback.innerHTML = '<i class="fas fa-check-circle"></i> ¡Exacto, respuesta perfecta!';
                }
                feedback.className = "feedback correct";
                document.getElementById('override-btn').classList.add('hidden');
            } else {
                feedback.innerHTML = `<i class="fas fa-times-circle"></i> Incorrecto.<br><span style="font-size:14px; font-weight:normal; color:#64748b; display:block; margin-top:5px;">La respuesta correcta es: <b>${correctAnswer}</b></span>`;
                feedback.className = "feedback incorrect";
                
                // Mostrar botón para forzar acierto si el usuario considera que sí estaba bien
                document.getElementById('override-btn').classList.remove('hidden');
            }
            
            document.getElementById('score-counter').innerHTML = `<i class="fas fa-star" style="color:#fbbf24;"></i> ${score}`;
            document.getElementById('user-answer').disabled = true;
            document.getElementById('check-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        // NUEVO: Función para anular la calificación incorrecta del sistema
        function overrideCorrect() {
            score++;
            document.getElementById('score-counter').innerHTML = `<i class="fas fa-star" style="color:#fbbf24;"></i> ${score}`;
            
            const feedback = document.getElementById('feedback');
            feedback.innerHTML = '<i class="fas fa-check-circle"></i> ¡Validada como correcta manualmente!';
            feedback.className = "feedback correct";
            
            document.getElementById('override-btn').classList.add('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < studyCards.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('study-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score} / ${studyCards.length}`;
            
            const message = document.getElementById('final-message');
            const porcentaje = score / studyCards.length;
            
            if (porcentaje === 1) message.innerText = "¡Impecable! Estás listo para el ascenso.";
            else if (porcentaje >= 0.7) message.innerText = "¡Muy bien! Un pequeño repaso más y lo tienes.";
            else message.innerText = "Sigue practicando, la repetición es la clave del éxito.";
        }

        function restartStudy() { startStudy(); }
    </script>
