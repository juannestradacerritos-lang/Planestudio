<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario</title>
    <meta name="theme-color" content="#2563eb">
    
    <!-- jsPDF para Exportar a PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Iconos de FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        // TRUCO PWA EN UN SOLO ARCHIVO
        const manifestData = {
            name: "Plan de estudio",
            short_name: "Cuestionario",
            start_url: window.location.href,
            display: "standalone",
            background_color: "#f1f5f9",
            theme_color: "#2563eb",
            icons: [{
                src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📕</text></svg>",
                sizes: "512x512",
                type: "image/svg+xml",
                purpose: "any maskable"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/manifest+json'});
        const manifestUrl = URL.createObjectURL(manifestBlob);
        document.write(`<link rel="manifest" href="${manifestUrl}">`);
    </script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
            --background: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        h2 { text-align: center; margin-top: 0; color: var(--primary); font-size: 26px; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; display: block; }
        input, select {
            width: 100%; padding: 12px; box-sizing: border-box;
            border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 15px; transition: border-color 0.2s;
            background-color: #f8fafc; font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        button {
            width: 100%; padding: 14px; margin-top: 5px;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); color: white; margin-top: 10px;}
        .btn-pdf { background-color: var(--danger); color: white; margin-top: 10px; }
        .btn-outline { background-color: transparent; border: 2px solid #cbd5e1; color: var(--text-muted); }
        .hidden { display: none !important; }
        
        /* Lista de preguntas */
        .questions-list-container {
            max-height: 220px; overflow-y: auto;
            margin-top: 15px; border: 1px solid #e2e8f0;
            border-radius: 8px; padding: 10px; background: #f8fafc;
        }
        .question-item {
            background: white; padding: 12px; margin-bottom: 8px;
            border-radius: 6px; border: 1px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .question-item-text { flex: 1; margin-right: 10px; font-size: 13px; color: #334155; }
        .action-btns { display: flex; gap: 5px; }
        .btn-icon { width: 35px; height: 35px; padding: 0; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin: 0; color: white;}
        .btn-edit { background-color: var(--warning); }
        .btn-delete { background-color: var(--danger); }

        .stats-bar {
            display: flex; justify-content: space-between; background: #f8fafc; padding: 12px;
            border-radius: 8px; margin-bottom: 20px; font-weight: 600; font-size: 14px; border: 1px solid #e2e8f0;
        }
        .question-box { 
            background: #f8fafc; padding: 25px 20px; border-radius: 12px; 
            text-align: center; margin-bottom: 20px; font-size: 18px; font-weight: 600; border: 1px solid #e2e8f0;
        }
        
        /* Estilos Opción Múltiple */
        .mc-option {
            width: 100%; padding: 14px; margin-bottom: 10px;
            border: 2px solid #e2e8f0; border-radius: 8px;
            background: white; font-size: 15px; color: var(--text-main);
            cursor: pointer; transition: 0.2s; text-align: left;
            display: block; font-weight: 500;
        }
        .mc-option:hover:not(:disabled) { border-color: var(--primary); background: #f8fafc; }
        .mc-option.correct-btn { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .mc-option.wrong-btn { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }

        .feedback { text-align: center; font-weight: bold; margin: 15px 0; font-size: 16px; min-height: 24px; }
        .correct { color: var(--success); }
        .incorrect { color: var(--danger); }
        
        .install-banner { 
            background: #0f172a; color: white; padding: 12px; 
            border-radius: 8px; text-align: center; margin-bottom: 20px; 
            cursor: pointer; display: none; font-weight: 600; font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- MODO CREADOR -->
    <div class="container" id="setup-section">
        <div class="install-banner" id="install-banner">
            <i class="fas fa-download"></i> Instalar como Aplicación
        </div>
        
        <h2>📕 Plan de estudio</h2>

        <div class="input-group">
            <label>Tema / Cuestionario actual</label>
            <div style="display: flex; gap: 8px;">
                <select id="quiz-selector" onchange="changeQuiz()"></select>
                <button class="btn-outline" style="width: auto; padding: 0 15px; margin: 0;" onclick="createNewQuiz()" title="Crear nuevo cuestionario">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>
        
        <div class="input-group">
            <label>Pregunta</label>
            <input type="text" id="question-input" placeholder="Escribe aquí tu pregunta...">
        </div>
        <div class="input-group">
            <label>Respuesta Correcta</label>
            <input type="text" id="answer-input" placeholder="Escribe la respuesta exacta...">
        </div>
        
        <button class="btn-primary" onclick="addQuestion()" style="margin-bottom: 15px;">
            <i class="fas fa-save"></i> Guardar Pregunta
        </button>
        
        <!-- Lista de preguntas -->
        <div class="questions-list-container" id="list-container">
            <div style="font-size: 13px; font-weight: bold; margin-bottom: 10px; color: var(--text-muted);">
                Preguntas en esta lista: <span id="count" style="color: var(--primary);">0</span>
            </div>
            <div id="questions-list"></div>
        </div>
        
        <!-- Botones de Inicio de Estudio -->
        <div style="margin-top: 20px;">
            <label style="text-align: center;">Opciones de Estudio:</label>
            <button class="btn-primary" style="background-color: #8b5cf6;" onclick="startStudy('multiple')">
                <i class="fas fa-list-ul"></i> Jugar Opción Múltiple
            </button>
            <button class="btn-success" onclick="startStudy('direct')">
                <i class="fas fa-keyboard"></i> Examen Escrito (Directo)
            </button>
            <button class="btn-pdf" onclick="exportPDF()">
                <i class="fas fa-file-pdf"></i> Guardar en PDF
            </button>
        </div>
    </div>

    <!-- MODO ESTUDIO -->
    <div class="container hidden" id="study-section">
        <div class="stats-bar">
            <span id="question-counter"><i class="fas fa-list-ol"></i> 1/1</span>
            <span id="score-counter"><i class="fas fa-star" style="color:#fbbf24;"></i> 0</span>
        </div>
        
        <div class="question-box" id="display-question">La pregunta aparecerá aquí</div>
        
        <!-- Contenedores Dinámicos -->
        <input type="text" id="user-answer" placeholder="Escribe tu respuesta exacta...">
        <div id="multiple-choice-container"></div>
        
        <p id="feedback" class="feedback"></p>
        
        <button class="btn-primary" id="check-btn" onclick="checkAnswer()">Comprobar Respuesta</button>
        <button class="btn-success hidden" id="next-btn" onclick="nextQuestion()">Siguiente <i class="fas fa-arrow-right"></i></button>
        <button class="btn-outline" style="margin-top: 15px;" onclick="location.reload()">Abandonar estudio</button>
    </div>

    <!-- RESULTADOS -->
    <div class="container hidden" id="results-section">
        <h2>📕 Plan de estudio</h2>
        <div class="question-box" style="font-size: 24px; color: var(--primary);">
            <span id="final-score">0/0</span>
        </div>
        <p id="final-message" style="text-align: center; font-weight: 600; margin-bottom: 25px;"></p>
        
        <button class="btn-primary" onclick="restartStudy()"><i class="fas fa-redo"></i> Repetir mismo modo</button>
        <button class="btn-outline" onclick="location.reload()" style="margin-top: 10px;"><i class="fas fa-home"></i> Volver al menú</button>
    </div>

    <script>
        // ==========================================
        // SERVICE WORKER (Para PWA)
        // ==========================================
        const swCode = `
            self.addEventListener('install', (e) => self.skipWaiting());
            self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
            self.addEventListener('fetch', (e) => {
                e.respondWith(fetch(e.request).catch(() => new Response('Modo Offline')));
            });
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });
        document.getElementById('install-banner').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                document.getElementById('install-banner').style.display = 'none';
                deferredPrompt = null;
            }
        });

        // ==========================================
        // GESTIÓN DE DATOS Y LISTAS
        // ==========================================
        let allData = JSON.parse(localStorage.getItem('misCuestionarios')) || { "Cuestionario Base": [] };
        let currentQuizName = Object.keys(allData)[0];
        let flashcards = allData[currentQuizName];
        let studyCards = [];
        let currentIndex = 0;
        let score = 0;
        let currentMode = 'direct'; // 'direct' o 'multiple'

        window.onload = () => {
            updateSelectorUI();
            updateListUI();
        };

        function saveData() {
            allData[currentQuizName] = flashcards;
            localStorage.setItem('misCuestionarios', JSON.stringify(allData));
        }

        function updateSelectorUI() {
            const selector = document.getElementById('quiz-selector');
            selector.innerHTML = '';
            for (let name in allData) {
                let option = document.createElement('option');
                option.value = name;
                option.innerText = name;
                if (name === currentQuizName) option.selected = true;
                selector.appendChild(option);
            }
        }

        function createNewQuiz() {
            let name = prompt("Escribe un nombre para el nuevo cuestionario:");
            if (name && name.trim() !== "") {
                if (!allData[name]) {
                    allData[name] = [];
                    currentQuizName = name;
                    flashcards = allData[currentQuizName];
                    saveData();
                    updateSelectorUI();
                    updateListUI();
                } else {
                    alert("Ese nombre ya existe.");
                }
            }
        }

        function changeQuiz() {
            currentQuizName = document.getElementById('quiz-selector').value;
            flashcards = allData[currentQuizName];
            updateListUI();
        }

        function addQuestion() {
            const q = document.getElementById('question-input').value;
            const a = document.getElementById('answer-input').value;
            if (q && a) {
                flashcards.push({ question: q, answer: a });
                saveData();
                document.getElementById('question-input').value = '';
                document.getElementById('answer-input').value = '';
                document.getElementById('question-input').focus();
                updateListUI();
            } else {
                alert("Llena la pregunta y la respuesta.");
            }
        }

        function deleteQuestion(index) {
            if (confirm("¿Estás seguro de borrar esta pregunta?")) {
                flashcards.splice(index, 1);
                saveData();
                updateListUI();
            }
        }

        function editQuestion(index) {
            document.getElementById('question-input').value = flashcards[index].question;
            document.getElementById('answer-input').value = flashcards[index].answer;
            flashcards.splice(index, 1);
            saveData();
            updateListUI();
            document.getElementById('question-input').focus();
        }

        function updateListUI() {
            const listEl = document.getElementById('questions-list');
            listEl.innerHTML = '';
            document.getElementById('count').innerText = flashcards.length;

            if (flashcards.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; color:#94a3b8; font-size:13px; margin-top:20px;">No hay preguntas aquí.</div>';
                return;
            }

            flashcards.forEach((item, index) => {
                listEl.innerHTML += `
                    <div class="question-item">
                        <div class="question-item-text">
                            <strong>P:</strong> ${item.question}<br>
                            <strong>R:</strong> ${item.answer}
                        </div>
                        <div class="action-btns">
                            <button onclick="editQuestion(${index})" class="btn-icon btn-edit" title="Modificar"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteQuestion(${index})" class="btn-icon btn-delete" title="Borrar"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        function exportPDF() {
            if (flashcards.length === 0) {
                alert("Agrega al menos una pregunta antes de exportar.");
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('portrait', 'mm', 'a4'); 
            
            doc.setFontSize(18);
            doc.setTextColor(37, 99, 235);
            doc.text(`Plan de Estudio: ${currentQuizName}`, 14, 20);
            
            doc.setFontSize(11);
            doc.setTextColor(100, 116, 139);
            const date = new Date().toLocaleDateString();
            doc.text(`Generado el: ${date} - Total de preguntas: ${flashcards.length}`, 14, 28);
            
            const tableData = flashcards.map((fc, i) => [i + 1, fc.question, fc.answer]);
            
            doc.autoTable({
                startY: 35,
                head: [['#', 'Pregunta', 'Respuesta Correcta']],
                body: tableData,
                theme: 'striped',
                headStyles: { fillColor: [220, 38, 38] },
                styles: { fontSize: 11, cellPadding: 5, overflow: 'linebreak' },
                columnStyles: { 0: { cellWidth: 15, halign: 'center' }, 1: { cellWidth: 80 }, 2: { cellWidth: 85 } },
                margin: { top: 30, right: 15, bottom: 20, left: 15 }
            });
            doc.save(currentQuizName.replace(/\s+/g, '_') + '.pdf');
        }

        // ==========================================
        // LÓGICA DE ESTUDIO (MIXTA)
        // ==========================================
        function shuffleArray(array) {
            let newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function startStudy(mode) {
            if (flashcards.length === 0) {
                alert("Agrega preguntas a este cuestionario primero.");
                return;
            }
            currentMode = mode;
            studyCards = shuffleArray(flashcards);
            currentIndex = 0;
            score = 0;
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('results-section').classList.add('hidden');
            document.getElementById('study-section').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('feedback').innerText = '';
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('question-counter').innerHTML = `<i class="fas fa-list-ol"></i> ${currentIndex + 1}/${studyCards.length}`;
            document.getElementById('score-counter').innerHTML = `<i class="fas fa-star" style="color:#fbbf24;"></i> ${score}`;
            document.getElementById('display-question').innerText = studyCards[currentIndex].question;
            
            const txtInput = document.getElementById('user-answer');
            const chkBtn = document.getElementById('check-btn');
            const mcContainer = document.getElementById('multiple-choice-container');

            if (currentMode === 'direct') {
                mcContainer.classList.add('hidden');
                txtInput.classList.remove('hidden');
                chkBtn.classList.remove('hidden');
                txtInput.value = '';
                txtInput.disabled = false;
                txtInput.focus();
            } else {
                txtInput.classList.add('hidden');
                chkBtn.classList.add('hidden');
                mcContainer.classList.remove('hidden');
                generateMultipleChoice(studyCards[currentIndex].answer);
            }
        }

        function generateMultipleChoice(correctAnswer) {
            let options = [correctAnswer];
            // Buscar respuestas de otras preguntas
            let wrongAnswers = flashcards.map(f => f.answer).filter(a => a.toLowerCase() !== correctAnswer.toLowerCase());
            
            // Rellenar si el usuario tiene menos de 4 preguntas en total
            const fillers = ["Ninguna de las opciones", "Consultar el manual de procedimientos", "Solicitar autorización al supervisor", "Todas las opciones mostradas"];
            while (wrongAnswers.length < 3) {
                let filler = fillers.pop();
                if(filler && !options.includes(filler)) wrongAnswers.push(filler);
            }
            
            wrongAnswers = shuffleArray(wrongAnswers);
            options = options.concat(wrongAnswers.slice(0, 3));
            options = shuffleArray(options); // Revolver la respuesta correcta entre las falsas
            
            const container = document.getElementById('multiple-choice-container');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'mc-option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedAnswer = null, btnElement = null) {
            let userAnswer = (currentMode === 'direct') ? document.getElementById('user-answer').value.trim().toLowerCase() : selectedAnswer.trim().toLowerCase();
            const correctAnswerText = studyCards[currentIndex].answer;
            const correctAnswer = correctAnswerText.trim().toLowerCase();
            const feedback = document.getElementById('feedback');

            if (userAnswer === correctAnswer) {
                feedback.innerHTML = '<i class="fas fa-check-circle"></i> ¡Correcto!';
                feedback.className = "feedback correct";
                score++;
                if (btnElement) btnElement.classList.add('correct-btn');
            } else {
                feedback.innerHTML = `<i class="fas fa-times-circle"></i> Incorrecto.<br><span style="font-size:14px; font-weight:normal; color:#64748b;">La respuesta era: <b>${correctAnswerText}</b></span>`;
                feedback.className = "feedback incorrect";
                if (btnElement) {
                    btnElement.classList.add('wrong-btn');
                    // Resaltar en verde la que sí era correcta
                    document.querySelectorAll('.mc-option').forEach(b => {
                        if(b.innerText.trim().toLowerCase() === correctAnswer) b.classList.add('correct-btn');
                    });
                }
            }
            
            document.getElementById('score-counter').innerHTML = `<i class="fas fa-star" style="color:#fbbf24;"></i> ${score}`;
            
            if (currentMode === 'direct') {
                document.getElementById('user-answer').disabled = true;
                document.getElementById('check-btn').classList.add('hidden');
            } else {
                document.querySelectorAll('.mc-option').forEach(b => b.disabled = true);
            }
            
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < studyCards.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('study-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score} / ${studyCards.length}`;
            
            const message = document.getElementById('final-message');
            const porcentaje = score / studyCards.length;
            
            if (porcentaje === 1) message.innerText = "¡Impecable! Estás listo para el ascenso.";
            else if (porcentaje >= 0.7) message.innerText = "¡Muy bien! Un pequeño repaso más y lo tienes.";
            else message.innerText = "Sigue practicando, la repetición es la clave del éxito.";
        }

        function restartStudy() { startStudy(currentMode); }
    </script>
</body>
</html>
